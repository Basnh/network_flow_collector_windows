{% extends "base.html" %}

{% block title %}Đăng nhập - Hệ thống Giám sát An ninh Mạng{% endblock %}

{% block extra_css %}
<style>
    /* Hide sidebar and navbar for login page */
    .sidebar { display: none !important; }
    .main-wrapper { margin-left: 0 !important; width: 100% !important; }
    
    /* Center the login container */
    .main-wrapper main {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 80px);
        padding: 0 !important;
        background-image: radial-gradient(circle at 50% 50%, rgba(9, 105, 218, 0.05) 0%, transparent 50%);
    }

    .login-container {
        width: 100%;
        max-width: 420px;
        z-index: 10;
        animation: fadeIn 0.8s ease-out;
        padding: 20px;
    }
    
    .login-card {
        background: var(--bg-card);
        border: 1px solid var(--border-default);
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        overflow: hidden;
        position: relative;
    }
    
    body[data-theme="light"] .login-card {
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
    }
    
    .login-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--accent-primary), var(--syntax-purple));
    }
    
    .login-header {
        padding: 40px 30px 20px;
        text-align: center;
    }
    
    .login-header i {
        font-size: 3.5rem;
        background: linear-gradient(135deg, var(--accent-primary) 0%, var(--syntax-purple) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 20px;
        filter: drop-shadow(0 4px 6px rgba(9, 105, 218, 0.2));
    }
    
    .login-header h3 {
        margin: 0;
        font-weight: 700;
        color: var(--text-main);
        font-size: 1.5rem;
    }
    
    .login-header p {
        color: var(--text-muted);
        margin-top: 8px;
        font-size: 0.95rem;
    }
    
    .login-body {
        padding: 20px 40px 40px;
    }
    
    .form-control {
        background-color: var(--bg-deep);
        border: 1px solid var(--border-default);
        color: var(--text-main);
        padding: 12px 15px;
        border-radius: 8px;
        transition: all 0.3s ease;
    }
    
    .form-control:focus {
        background-color: var(--bg-deep);
        border-color: var(--accent-primary);
        box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.15);
        color: var(--text-main);
    }
    
    .input-group-text {
        background-color: var(--bg-deep);
        border: 1px solid var(--border-default);
        border-right: none;
        color: var(--text-muted);
        padding-left: 20px;
    }
    
    .form-control {
        border-left: none;
    }

    body[data-theme="dark"] .form-control:-webkit-autofill {
        -webkit-box-shadow: 0 0 0 30px var(--bg-deep) inset !important;
        -webkit-text-fill-color: var(--text-main) !important;
    }
    
    .btn-login {
        background: linear-gradient(135deg, var(--accent-primary) 0%, #064b9d 100%);
        border: none;
        color: white;
        padding: 14px;
        font-weight: 600;
        border-radius: 8px;
        width: 100%;
        margin-top: 20px;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    
    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(9, 105, 218, 0.4);
        color: white;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-shield-alt"></i>
            <h3>Đăng nhập quản trị</h3>
            <p>Networking Security Center</p>
        </div>
        <div class="login-body">
            <form method="POST" action="{{ url_for('login', next=request.args.get('next', '')) }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold text-uppercase">Tài khoản</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" class="form-control" name="username" placeholder="Nhập tên đăng nhập" required autocomplete="username" autofocus>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold text-uppercase">Mật khẩu</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" name="password" placeholder="Nhập mật khẩu" required autocomplete="current-password">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-login no-loading no-effects">
                    Truy cập hệ thống <i class="fas fa-arrow-right ms-2"></i>
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
